<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow-x: hidden;
        }
        .invoice-container {
            background-color: #2b2b2b;
            padding: 30px;
            border-radius: 8px;
            max-width: 700px;
            width: 95%;
        }
        h1 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label, input, textarea {
            display: block;
            width: 100%;
            padding: 8px;
            border: none;
            background-color: #3a3a3a;
            color: white;
            font-size: 16px;
        }
        .add-item-group {
            margin-bottom: 20px;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #4e4e4e;
            padding: 8px 0;
        }
        .total-section {
            margin-top: 20px;
            text-align: right;
        }
        button {
            background-color: #6c63ff;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 20px;
        }
        @media print {
            body * {
                visibility: hidden;
            }
            .invoice-container, .invoice-container * {
                visibility: visible !important;
            }
            .invoice-container {
                width: auto;
                border-radius: 0;
                background-color: #fff;
                box-shadow: none;
                padding: 20px;
                margin-top: 50px;
            }
            .form-group, label, input, textarea, button {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="invoice-container">
        <h1>Invoice Generator</h1>

        <div class="form-group">
            <label for="businessName">Business Name:</label>
            <input id="businessName" type="text">
        </div>

        <div class="form-group">
            <label for="clientName">Client Name:</label>
            <input id="clientName" type="text">
        </div>

        <div class="form-group">
            <label for="address">Address:</label>
            <textarea id="address" rows="4"></textarea>
        </div>

        <h2>Items</h2>
        <div id="itemRows">
            <!-- Item rows will be dynamically added here -->
        </div>

        <button onclick="addItem()">Add Line Item</button>

        <div class="total-section">
            Subtotal: <span id="subtotal">0.00</span><br>
            Tax: <span id="tax">0.00</span><br>
            Total: <span id="total">0.00</span>
        </div>

        <button onclick="printInvoice()">Print Invoice</button>
    </div>

    <script>
        function addItem() {
            const rowId = `itemRow${Date.now()}${Math.random()}`;
            const itemRows = document.getElementById('itemRows');
            const newRow = `
                <div class="item-row" id="${rowId}">
                    <input type="text" placeholder="Description">
                    <input type="number" placeholder="Quantity">
                    <input type="number" placeholder="Rate">
                </div>
            `;
            itemRows.insertAdjacentHTML('beforeend', newRow);
        }

        function calculateInvoice() {
            const items = document.querySelectorAll('#itemRows input[type="number"]');
            let subtotal = 0;
            for (let i = 0; i < items.length - 2; i += 3) {
                const quantity = parseFloat(items[i].value);
                const rate = parseFloat(items[i + 1].value);
                if (!isNaN(quantity) && !isNaN(rate)) {
                    subtotal += quantity * rate;
                }
            }
            document.getElementById('subtotal').textContent = subtotal.toFixed(2);

            // Assuming a tax rate of 5%
            const taxRate = 0.05;
            const totalTax = subtotal * taxRate;
            document.getElementById('tax').textContent = totalTax.toFixed(2);
            const totalAmount = subtotal + totalTax;
            document.getElementById('total').textContent = totalAmount.toFixed(2);
        }

        window.addEventListener('load', () => {
            calculateInvoice();
            document.querySelectorAll('#itemRows input[type="number"]').forEach(input => {
                input.addEventListener('input', calculateInvoice);
            });
        });

        function printInvoice() {
            window.print();
        }
    </script>
</body>
</html>
