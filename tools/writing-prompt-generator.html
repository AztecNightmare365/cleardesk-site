<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Prompt Generator</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1f1f1f;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
            padding: 20px;
        }
        .prompt {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #6c63ff;
        }
        .filters {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin: 20px auto;
        }
        .filter-btn {
            background-color: transparent;
            border: none;
            cursor: pointer;
            color: #6c63ff;
            font-size: 1.1em;
            transition: color 0.3s ease;
        }
        .filter-btn:hover {
            color: #b297ff;
        }
        .copy-button {
            background-color: #6c63ff;
            border: none;
            padding: 5px 10px;
            color: white;
            cursor: pointer;
            font-size: 0.8em;
            margin-top: 5px;
        }
        .filter-btn.active {
            color: #b297ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Writing Prompt Generator</h1>
        <input type="text" id="favoritePrompt" placeholder="Favorite Prompt ID" style="display:none;">
        <button onclick="saveFavorite()">Save Favorite</button>
        
        <div class="filters">
            <label for="genreFilter">Genre:</label>
            <select id="genreFilter" onchange="filterPrompts()">
                <option value="">All</option>
                <option value="fantasy">Fantasy</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="romance">Romance</option>
                <option value="horror">Horror</option>
                <option value="thriller">Thriller</option>
            </select>
        </div>

        <button onclick="getRandomPrompt()">Get Random Prompt</button>
        
        <hr>
        
        <div id="promptArea">
            <p class="prompt"></p>
            <button class="copy-button" onclick="copyToClipboard()">Copy Prompt</button>
        </div>

        <script>
            const prompts = {
                fantasy: [
                    "In a world where magic is the norm, a young wizard discovers an ancient spell that could change everything.",
                    "A village is terrorized by a mysterious creature with eyes that see into their deepest fears. Can a brave warrior uncover its origins?",
                    // Add more fantasy prompts here
                ],
                sci-fi: [
                    "An astronaut from Earth accidentally lands on a rogue planet where time flows backwards, forcing them to relive moments over and over.",
                    "In a future where humans have colonized other planets, a scientist uncovers evidence of an ancient alien civilization that could rewrite history.",
                    // Add more sci-fi prompts here
                ],
                romance: [
                    "Two estranged lovers reunite on a tropical island, but their past mistakes threaten to tear them apart once again.",
                    "A city is filled with love spells and magic. A skeptical detective must unravel the truth behind a mysterious case that threatens to upend lives.",
                    // Add more romance prompts here
                ],
                horror: [
                    "A group of friends stays at an isolated cabin, only to find out it's haunted by restless spirits of those who died there years ago.",
                    "In a small town where everyone knows each other’s secrets, one person starts receiving chilling letters that seem to know things they should not.",
                    // Add more horror prompts here
                ],
                thriller: [
                    "A detective is forced to confront his own past when he discovers a shocking connection between his case and his family history.",
                    "In a high-stakes game of survival, two strangers team up in a derelict building surrounded by unknown threats.",
                    // Add more thriller prompts here
                ]
            };

            let currentGenre = '';

            function getRandomPrompt() {
                if (currentGenre) {
                    const genrePrompts = prompts[currentGenre];
                    const randomIndex = Math.floor(Math.random() * genrePrompts.length);
                    document.getElementById('promptArea').innerHTML = `
                        <p class="prompt">${genrePrompts[randomIndex]}</p>
                        <button class="copy-button" onclick="copyToClipboard()">Copy Prompt</button>`;
                } else {
                    const allPrompts = Object.values(prompts).flat();
                    const randomPrompt = allPrompts[Math.floor(Math.random() * allPrompts.length)];
                    document.getElementById('promptArea').innerHTML = `
                        <p class="prompt">${randomPrompt}</p>
                        <button class="copy-button" onclick="copyToClipboard()">Copy Prompt</button>`;
                }
            }

            function filterPrompts() {
                currentGenre = document.getElementById('genreFilter').value;
                getRandomPrompt();
            }

            function copyToClipboard() {
                const promptElement = document.querySelector('.prompt');
                navigator.clipboard.writeText(promptElement.textContent);
            }

            function saveFavorite() {
                const favoritePromptId = document.getElementById('favoritePrompt').value;
                if (favoritePromptId) {
                    let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
                    favorites.push(favoritePromptId);
                    localStorage.setItem('favorites', JSON.stringify(favorites));
                    alert("Favorite saved!");
                }
            }

            getRandomPrompt();
        </script>
    </div>
</body>
</html>
