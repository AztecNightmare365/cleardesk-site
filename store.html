  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #f0f0f0; }

    nav {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #222;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 100;
    }
    nav .logo { font-size: 22px; font-weight: 700; }
    nav .logo span { color: #6c63ff; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 24px; }
    nav a:hover { color: #fff; }

    .hero {
      text-align: center;
      padding: 80px 20px 60px;
    }
    .hero h1 { font-size: 42px; font-weight: 800; margin-bottom: 16px; }
    .hero h1 span { color: #6c63ff; }
    .hero p { font-size: 17px; color: #aaa; max-width: 500px; margin: 0 auto; }

    .filters {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #aaa;
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #6c63ff;
      border-color: #6c63ff;
      color: #fff;
    }

    .section-label {
      max-width: 1100px;
      margin: 32px auto 0;
      padding: 0 40px;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #555;
      border-bottom: 1px solid #1a1a1a;
      padding-bottom: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 40px 60px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { transform: translateY(-4px); border-color: #6c63ff; }

    .card-thumb {
      height: 160px;
      background: linear-gradient(135deg, #1e1b4b, #312e81);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }
    .card-thumb.business { background: linear-gradient(135deg, #1a2e1a, #1f4d1f); }
    .card-thumb.creative { background: linear-gradient(135deg, #2e1a2e, #4d1f4d); }
    .card-thumb.productivity { background: linear-gradient(135deg, #2e2a1a, #4d421f); }

    .card-body { padding: 20px; }
    .card-tag {
      font-size: 11px;
      color: #6c63ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card-tag.business { color: #63ff8f; }
    .card-tag.creative { color: #ff63d4; }
    .card-tag.productivity { color: #ffb563; }
    .card-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .card-desc { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 16px; }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-price { font-size: 20px; font-weight: 800; color: #6c63ff; }
    .buy-btn {
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .buy-btn:hover { background: #5a52d5; }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 36px;
      max-width: 460px;
      width: 90%;
    }
    .modal h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .modal .modal-price { font-size: 28px; font-weight: 800; color: #6c63ff; margin-bottom: 20px; }
    .modal label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
    .modal input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #333;
      color: #fff;
      padding: 12px;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    #card-element {
      background: #0f0f0f;
      border: 1px solid #333;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    #payment-error { color: #ff6b6b; font-size: 13px; margin-bottom: 12px; min-height: 18px; }
    .modal-btns { display: flex; gap: 12px; }
    .pay-btn {
      flex: 1;
      background: #6c63ff;
      color: #fff;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .cancel-btn {
      background: #333;
      color: #aaa;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #444;
      font-size: 13px;
      border-top: 1px solid #1a1a1a;
    }
    footer a { color: #6c63ff; text-decoration: none; }
  </style>
</head>

const STRIPE_PK = "pk_test_51TmHWT8kXYgX5l5BzqcLGex4fBm19XkpnDM4oeJk11H3CbFp1UKy9IyA8V1HoBerkNffFodUskeTG1HEDc9BG9jX00orttkfHN";
const stripe = Stripe(STRIPE_PK);
const elements = stripe.elements();
const cardElement = elements.create("card", {
  style: { base: { color: "#ffffff", fontSize: "15px", "::placeholder": { color: "#555" } } }
});
cardElement.mount("#card-element");

let currentProduct = null;

const CATEGORY_COLORS = { study: "", business: "business", creative: "creative", productivity: "productivity" };

function renderProducts(filter) {
  const grid = document.getElementById("product-grid");
  const filtered = filter === "all" ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="text-align:center;padding:80px;color:#555;grid-column:1/-1;">No tools in this category yet. Check back soon.</div>`;
    return;
  }

  const categories = filter === "all"
    ? [...new Set(PRODUCTS.map(p => p.category))]
    : [filter];

  let html = "";
  for (const cat of categories) {
    const items = filtered.filter(p => p.category === cat);
    if (!items.length) continue;
    const labels = { study: "📚 Study Tools", business: "💼 Business Tools", creative: "🎨 Creative Tools", productivity: "🎯 Productivity Tools" };
    if (filter === "all") html += `<div class="section-label">${labels[cat] || cat}</div>`;
    html += `<div class="grid">`;
    html += items.map(p => `
      <div class="card">
        <div class="card-thumb ${CATEGORY_COLORS[p.category]}">${p.emoji}</div>
        <div class="card-body">
          <div class="card-tag ${CATEGORY_COLORS[p.category]}">${p.category}</div>
          <div class="card-title">${p.title}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-footer">
            <div class="card-price">$${p.price}</div>
            <button class="buy-btn" onclick="openModal('${p.id}')">Get Tool</button>
          </div>
        </div>
      </div>
    `).join("");
    html += `</div>`;
  }
  grid.innerHTML = html;
}

function filterProducts(cat, btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderProducts(cat);
}

renderProducts("all");

function openModal(id) {
  currentProduct = PRODUCTS.find(p => p.id === id);
  document.getElementById("modal-title").textContent = currentProduct.title;
  document.getElementById("modal-price").textContent = `$${currentProduct.price}`;
  document.getElementById("payment-error").textContent = "";
  document.getElementById("email-input").value = "";
  document.getElementById("modal").classList.add("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  currentProduct = null;
}

async function handlePayment() {
  const email = document.getElementById("email-input").value.trim();
  if (!email || !email.includes("@")) {
    document.getElementById("payment-error").textContent = "Enter a valid email.";
    return;
  }

  const btn = document.getElementById("pay-btn");
  btn.disabled = true;
  btn.textContent = "Processing...";
  document.getElementById("payment-error").textContent = "";

  try {
    const res = await fetch("/.netlify/functions/create-payment", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        amount: currentProduct.price * 100,
        productId: currentProduct.id,
        email: email
      })
    });

    const { clientSecret, error: serverError } = await res.json();
    if (serverError) throw new Error(serverError);

    const { error, paymentIntent } = await stripe.confirmCardPayment(clientSecret, {
      payment_method: { card: cardElement, billing_details: { email } }
    });

    if (error) {
      document.getElementById("payment-error").textContent = error.message;
    } else if (paymentIntent.status === "succeeded") {
      closeModal();
      showSuccess(currentProduct);
    }
  } catch (e) {
    document.getElementById("payment-error").textContent = "Payment failed. Try again.";
  }

  btn.disabled = false;
  btn.textContent = "Pay Now";
}

function showSuccess(product) {
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:20px;background:#0f0f0f;padding:40px;">
      <div style="font-size:64px;">✅</div>
      <h1 style="font-size:28px;font-weight:800;">Payment Successful!</h1>
      <p style="color:#aaa;font-size:16px;text-align:center;">Your tool is ready. Click below to download.</p>
      <a href="${product.downloadUrl}" download
         style="background:#6c63ff;color:#fff;padding:16px 32px;border-radius:10px;text-decoration:none;font-size:16px;font-weight:700;">
        ⬇ Download ${product.title}
      </a>
      <p style="color:#555;font-size:13px;">Opens in your browser — save it to your computer.</p>
      <a href="store.html" style="color:#555;font-size:14px;margin-top:8px;">Back to store</a>
    </div>
  `;
}
